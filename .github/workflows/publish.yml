name: Publish to npm

# Triggered by pushing a version tag: git tag v0.5.0 && git push origin v0.5.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm # Configure this environment in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      # Verify the git tag matches the package.json version
      - name: Verify version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Version: ${PKG_VERSION}"

      - name: Build all platforms
        run: ./scripts/build-npm.sh

      - name: Publish to npm
        run: ./scripts/publish-npm.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for npm to propagate..."
          sleep 10
          npm view skilltree@${VERSION} version
          echo "Successfully verified skilltree@${VERSION} on npm"
