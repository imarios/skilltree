name: Publish to npm

# Triggered by pushing a version tag: git tag v0.5.0 && git push origin v0.5.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm # Configure this environment in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      # Verify the git tag matches the package.json version
      - name: Verify version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Version: ${PKG_VERSION}"

      - name: Build all platforms
        run: ./scripts/build-npm.sh

      - name: Publish to npm
        run: ./scripts/publish-npm.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages
        # Retry with backoff: npm registry CDN propagation can take 30–90s.
        # A fixed 10s sleep raced propagation and produced spurious E404
        # failures on otherwise-successful releases (see #39).
        # Six attempts × 15s = ~90s cap, with per-attempt log so a reader
        # can see the step is waiting, not stuck.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for i in 1 2 3 4 5 6; do
            if npm view "skilltree-pm@${VERSION}" version 2>/dev/null; then
              echo "✔ Verified skilltree-pm@${VERSION} on npm (attempt ${i})"
              exit 0
            fi
            echo "Not visible yet (attempt ${i}/6) — waiting 15s..."
            sleep 15
          done
          echo "::error::skilltree-pm@${VERSION} not visible on npm after ~90s"
          exit 1
