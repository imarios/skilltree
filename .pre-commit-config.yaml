repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.claude/(skills|agents)/
      - id: end-of-file-fixer
        exclude: ^\.claude/(skills|agents)/
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: biome-lint
        name: Lint (biome)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run lint'
        language: system
        files: '\.ts$'
        pass_filenames: false
      - id: biome-format
        name: Format check (biome)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run format:check'
        language: system
        files: '\.ts$'
        pass_filenames: false
      - id: typecheck
        name: Type check (tsc)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run typecheck'
        language: system
        files: '\.ts$'
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: auto-setup-on-bump
        name: Auto-setup after version bump
        entry: bash -c 'PREV=$(git diff HEAD@{1} HEAD -- package.json | grep "^-.*\"version\"" | sed "s/.*\"\([0-9][^\"]*\)\".*/\1/"); CURR=$(grep "\"version\"" package.json | head -1 | sed "s/.*\"\([0-9][^\"]*\)\".*/\1/"); if [ -n "$PREV" ] && [ "$PREV" != "$CURR" ]; then echo "Version changed $PREV → $CURR, running make setup..."; make setup; fi'
        language: system
        stages: [post-merge]
        always_run: true
        pass_filenames: false
