repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.claude/(skills|agents)/
      - id: end-of-file-fixer
        exclude: ^\.claude/(skills|agents)/
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: biome-lint
        name: Lint (biome)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run lint'
        language: system
        files: '\.ts$'
        pass_filenames: false
      - id: biome-format
        name: Format check (biome)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run format:check'
        language: system
        files: '\.ts$'
        pass_filenames: false
      - id: typecheck
        name: Type check (tsc)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run typecheck'
        language: system
        files: '\.ts$'
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
