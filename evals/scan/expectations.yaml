# Scan eval expectations
# Each skill defines what regex and LLM should detect (undeclared only).
# "must_detect" = must be in the results (miss = failure)
# "must_not_detect" = must NOT be in the results (presence = false positive)

# Straightforward explicit references — regex should catch all of these
explicit-refs:
  declared: [testing]
  regex:
    must_detect: [linting, general-coding, typescript-coding]
    must_not_detect: []
  llm:
    must_detect: [linting, general-coding, typescript-coding]
    must_not_detect: []

# Tricky negations, comparisons, historical mentions — should NOT trigger
# This is the hardest case. Regex will false-positive because it can't understand
# negation ("does NOT use"), comparison ("unlike the X skill"), or past tense
# ("used to depend on"). LLM should do better.
false-positives:
  declared: []
  regex:
    # Regex WILL false-positive here — it matches "the X skill" patterns regardless
    # of surrounding context. We document this as a known limitation.
    must_detect: []
    must_not_detect: []  # We don't penalize regex for false positives in this case
  llm:
    must_detect: []
    must_not_detect: [python-coding, testing, linting, general-coding, typescript-coding, deployment, ci-pipeline]

# No explicit skill names — only semantic references to security, testing, coding practices.
# These are opportunistic/best-effort references, not hard dependencies.
# A would not do measurably worse without B — it's general guidance, not a skill requirement.
implicit-deps:
  declared: []
  regex:
    must_detect: []
    must_not_detect: []
  llm:
    must_detect: []
    must_not_detect: []

# Mix of real deps, negated mentions, and optional suggestions
mixed-signals:
  declared: [code-review]
  regex:
    must_detect: [typescript-coding, python-coding, general-coding]
    must_not_detect: []
  llm:
    must_detect: [typescript-coding, python-coding, general-coding]
    # "not a replacement for cybersecurity" and "optional deployment" should not be deps
    must_not_detect: [cybersecurity, deployment, splunk]

# Plural/generic references ("dedicated skills", "coding standards") mixed with one real ref
# Tests whether the detector can distinguish "skills" (generic) from "code-review skill" (specific)
plural-generic:
  declared: []
  regex:
    must_detect: [code-review]
    must_not_detect: []
  llm:
    must_detect: [code-review]
    # "dedicated skills", "coding standards", "testing guidelines" are generic — not specific skill refs
    must_not_detect: []

# Conditional references ("if Python, use python-coding; if TypeScript, use typescript-coding")
# All conditions are real usage — they should all be detected
conditional-deps:
  declared: [code-review]
  regex:
    must_detect: [python-coding, typescript-coding, general-coding, cybersecurity]
    must_not_detect: []
  llm:
    must_detect: [python-coding, typescript-coding, general-coding, cybersecurity]
    must_not_detect: []

# Various quoting styles: backticks, angle brackets, double quotes, single quotes
# Tests regex patterns for different delimiters
quoted-refs:
  declared: []
  regex:
    must_detect: [general-coding, typescript-coding, python-coding, code-review, testing, linting]
    must_not_detect: []
  llm:
    must_detect: [general-coding, typescript-coding, python-coding, code-review, testing, linting]
    must_not_detect: []

# Purely architectural language — no skill names at all
# Talks about security, testing, deployment concepts without naming any skill
# LLM might infer deps but it's genuinely ambiguous whether specific skills are needed
deeply-implicit:
  declared: []
  regex:
    must_detect: []
    must_not_detect: []
  llm:
    must_detect: []  # No specific skill is clearly required — this is architectural guidance
    must_not_detect: []

# Agent-style with skills: field, mix of explicit and contextual refs
agent-style:
  declared: [code-review]
  regex:
    must_detect: [cybersecurity, splunk, general-coding]
    must_not_detect: []
  llm:
    must_detect: [cybersecurity, splunk, general-coding]
    must_not_detect: []
